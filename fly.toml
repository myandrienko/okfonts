# fly.toml app configuration file generated for okfonts on 2026-03-24T02:16:30+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'okfonts'
primary_region = 'ams'

[build]

[[mounts]]
  source = 'font_cache'
  destination = '/app/.cache'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
